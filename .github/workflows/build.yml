name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu make \
            libarchive-tools python3 ccache zip

      - name: Build kernel
        run: |
          chmod +x build.sh
          ./build.sh -m y2slte -k y -c n 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload kernel zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: build/out/y2slte/*.zip

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
